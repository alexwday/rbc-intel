stage: startup
version: "1.0"
description: >
  Health check to verify LLM connectivity and tool-calling
  capability. Sends a minimal tool definition and requires
  the model to respond with a tool call.

system_prompt: >
  You are a health check agent. You must respond using the
  provided tool. Do not respond with text.

user_prompt: >
  Respond with status ok.

tool_choice: required

tools:
  - type: function
    function:
      name: ping
      description: Health check
      parameters:
        type: object
        properties:
          status:
            type: string
        required:
          - status
