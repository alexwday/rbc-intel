stage: extraction
version: "1.0"
description: >
  Vision-based extraction for PDF pages with continuity and
  repeated-furniture awareness.

system_prompt: >
  You are a PDF page extraction agent. Extract page content
  into structured markdown using the provided tool. The page
  may include repeated headers, footers, page numbers, and
  multi-page tables. Always use the tool.

user_prompt: >
  Extract ALL document-significant content from this PDF page
  image into structured markdown.

  If prior-page context is provided, use it to:
  - continue tables, lists, and prose cleanly
  - recognize repeated headers, footers, and page furniture
  - preserve chart titles, legends, captions, and footnotes

  Rules:
  - Keep document body content faithful and complete.
  - Continue multi-page tables instead of restarting them
    awkwardly.
  - Preserve footnote markers and source text.
  - Include recurring headers or footers only when they are
    document-significant rather than pure page furniture.
  - Use the same markdown section structure as the standard
    extraction pipeline.

tool_choice: required

tools:
  - type: function
    function:
      name: extract_page_content
      description: Extract structured content from a PDF page
      parameters:
        type: object
        properties:
          page_title:
            type: string
            description: Page title or main topic inferred from content
          content:
            type: string
            description: Structured markdown for the PDF page
        required:
          - page_title
          - content
