stage: extraction
version: "1.2"
description: >
  Vision-based page extraction. Sends a rendered page image
  to the LLM and receives structured markdown via tool calling.

system_prompt: >
  You are a document processing agent. You extract content
  from document page images into structured markdown using
  the provided tool. Always use the tool to respond.

user_prompt: >
  Extract ALL content from this page image into structured
  markdown. Use the extract_page_content tool to respond.


  ## Page title

  Infer a concise page title or main topic from the content.


  ## Content structure

  Organize extracted content into the sections below. Every
  piece of content must go inside exactly one section — never
  place text before, between, or after the section headers.
  Only include a section header (### Text, ### Tables,
  ### Charts and Visuals, ### Footnotes) when that section
  has content. Omit the header entirely if empty.


  ### Text

  All visible prose text, faithfully transcribed. Use markdown
  heading levels (###, ####) for document titles, section
  headers, and any prominent standalone headings. Use bullet
  points (-) only for actual list items. Do not duplicate
  content that belongs in another section — table captions go
  with their table in ### Tables, chart titles and data labels
  go in ### Charts and Visuals, and footnotes go in
  ### Footnotes.


  ### Tables

  Reproduce every table as a markdown pipe table with a header
  row and --- separator. Include all column headers and every
  data row with values, including subtotal and total rows.
  Preserve all special characters exactly as displayed: $, %,
  +/-, parentheses for negatives, and footnote markers. Do not
  round or alter any numbers — preserve the exact precision
  shown. For merged cells spanning rows, place the value in
  the first row and leave subsequent cells empty. Place table
  captions and source attributions directly above or below
  the pipe table. Only include this section when the page
  contains at least one table.


  ### Charts and Visuals

  For every chart, graph, diagram, icon grid, or infographic:

  **[Chart title, or "Untitled Chart" if none visible]**

  - Type: [bar / grouped bar / stacked bar / line / combo
  bar+line / waterfall / pie / donut / scatter / area / other]

  - X-axis: [label, scale, and units]

  - Y-axis: [label, scale, and units; include secondary axis
  if present]

  - Legend: [all legend entries]

  - Data points: [every readable number, label, and percentage
  — list systematically left-to-right for bar/line charts,
  largest-to-smallest for pie charts]

  - Key insight: [one sentence on what the visual communicates]

  Only include this section when the page contains at least one
  chart, graph, diagram, or infographic. Never include this
  section just to say none are present.


  ### Footnotes

  Transcribe every footnote, endnote, source attribution, and
  legal disclaimer. Format each footnote marker consistently
  using bracket notation: [1], [2], [*], [†], [‡]. In the
  ### Text and ### Tables sections, replace superscript markers
  with the same bracket notation so footnotes are cross-
  referenced (e.g. "revenue increased 12.3%[1]"). Only include
  this section when the page contains at least one footnote or
  attribution.


  ## Rules

  - Transcribe every number visible on the page, including chart
  axis values and small data labels.

  - If the page is blank or purely decorative (no text or data),
  set page_title to "Blank Page" and content to
  "## Blank or Decorative Page".

  - Respond with ONLY the structured markdown — no preamble,
  no closing remarks.

tool_choice: required

tools:
  - type: function
    function:
      name: extract_page_content
      description: Extract structured content from a document page
      parameters:
        type: object
        properties:
          page_title:
            type: string
            description: Page title or main topic inferred from content
          content:
            type: string
            description: >
              Full structured markdown with ### Text, ### Tables,
              ### Charts and Visuals, and ### Footnotes sections
        required:
          - page_title
          - content
